<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Camazotz{% endblock %}</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08060a;
  --bg2:#0e0a12;
  --surface:#141018;
  --surface2:#1a1520;
  --border:#241e2c;
  --border2:#2e2638;
  --text:#ede8f2;
  --text2:#a89cb8;
  --muted:#6b5f7a;
  --accent:#dc2626;
  --accent2:#f87171;
  --accent-glow:rgba(220,38,38,.12);
  --crimson:#991b1b;
  --green:#10b981;
  --red:#ef4444;
  --orange:#f59e0b;
  --yellow:#eab308;
  --blue:#3b82f6;
  --radius:12px;
  --font-mono:'JetBrains Mono','Fira Code',Consolas,'Courier New',monospace;
}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  line-height:1.6;-webkit-font-smoothing:antialiased;
}
a{color:var(--accent2);text-decoration:none;transition:color .2s}
a:hover{color:#fca5a5}
code,pre{font-family:var(--font-mono)}

.nav{position:sticky;top:0;z-index:100;background:rgba(8,6,10,.88);
  backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.nav-inner{max-width:1100px;margin:0 auto;padding:0 2rem;height:60px;
  display:flex;align-items:center;justify-content:space-between}
.nav-brand{display:flex;align-items:center;gap:10px;font-weight:700;
  font-size:1.05rem;letter-spacing:-.02em;color:var(--text)}
.nav-brand:hover{color:var(--text)}
.nav-brand svg{width:30px;height:30px}
.nav-brand .brand-text span{color:var(--accent2)}
.nav-links{display:flex;gap:2rem;align-items:center}
.nav-links a{color:var(--text2);font-size:.875rem;font-weight:500;transition:color .2s}
.nav-links a:hover,.nav-links a.active{color:var(--text)}
.diff-switcher{display:flex;align-items:center;gap:.4rem;margin-left:.5rem}
.diff-switcher label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:600}
.diff-switcher select{background:var(--surface);color:var(--text);border:1px solid var(--border);
  border-radius:6px;padding:.3rem .5rem;font-size:.78rem;cursor:pointer;font-family:inherit;
  transition:border-color .2s}
.diff-switcher select:focus{outline:none;border-color:var(--accent)}
.diff-switcher select option{background:var(--bg);color:var(--text)}
.diff-dot{width:6px;height:6px;border-radius:50%;transition:background .3s}
.diff-dot.easy{background:#10b981}
.diff-dot.medium{background:#eab308}
.diff-dot.hard{background:#ef4444}

.nav-reset{background:var(--surface);color:var(--text2);border:1px solid var(--border);
  border-radius:6px;padding:.3rem .6rem;font-size:.72rem;font-weight:600;cursor:pointer;
  font-family:inherit;transition:all .2s;text-transform:uppercase;letter-spacing:.04em}
.nav-reset:hover{border-color:var(--accent);color:var(--accent2)}
.nav-reset.resetting{opacity:.5;cursor:wait}

.container{max-width:1100px;margin:0 auto;padding:0 2rem}
.section{padding:4rem 0}

.footer{border-top:1px solid var(--border);padding:2rem 0;margin-top:4rem}
.footer-inner{max-width:1100px;margin:0 auto;padding:0 2rem;
  display:flex;justify-content:space-between;align-items:center}
.footer-text{font-size:.75rem;color:var(--muted)}
.footer-links{display:flex;gap:1.5rem}
.footer-links a{font-size:.75rem;color:var(--muted);transition:color .2s}
.footer-links a:hover{color:var(--text2)}

.dbg-trigger{color:var(--muted);font-family:var(--font-mono);font-size:.75rem;
  cursor:default;user-select:none;margin-left:.6rem;opacity:.65;transition:all .3s;
  letter-spacing:.05em}
.dbg-trigger:hover{opacity:1;color:var(--text2)}
.dbg-trigger.active{opacity:1;color:var(--green)}

#cztzDbg{position:fixed;bottom:0;left:0;right:0;z-index:9999;
  max-height:260px;transform:translateY(100%);transition:transform .3s ease;
  background:rgba(8,6,10,.96);border-top:1px solid var(--border);
  backdrop-filter:blur(12px);font-family:var(--font-mono);font-size:.72rem;
  display:flex;flex-direction:column}
#cztzDbg.open{transform:translateY(0)}
.dbg-bar{display:flex;align-items:center;justify-content:space-between;
  padding:.35rem .8rem;border-bottom:1px solid var(--border);flex-shrink:0}
.dbg-bar-left{display:flex;align-items:center;gap:.6rem;color:var(--muted)}
.dbg-bar-left .dot{width:5px;height:5px;border-radius:50%;background:var(--green)}
.dbg-bar-left .dot.err{background:var(--red)}
.dbg-btns button{background:none;border:1px solid var(--border);color:var(--muted);
  font-family:var(--font-mono);font-size:.65rem;padding:.15rem .5rem;border-radius:4px;
  cursor:pointer;margin-left:.4rem;transition:all .15s}
.dbg-btns button:hover{border-color:var(--text2);color:var(--text2)}
.dbg-log{overflow-y:auto;flex:1;padding:.3rem 0}
.dbg-entry{padding:.2rem .8rem;border-bottom:1px solid rgba(36,30,44,.4);
  display:flex;gap:.6rem;align-items:baseline;line-height:1.5}
.dbg-entry:hover{background:rgba(26,21,32,.6)}
.dbg-ts{color:var(--muted);flex-shrink:0;min-width:62px}
.dbg-method{font-weight:700;flex-shrink:0;min-width:36px}
.dbg-method.get{color:var(--blue)}
.dbg-method.post{color:var(--orange)}
.dbg-method.put{color:var(--yellow)}
.dbg-url{color:var(--text2);flex-shrink:0}
.dbg-status{font-weight:600;flex-shrink:0;min-width:28px}
.dbg-status.ok{color:var(--green)}
.dbg-status.err{color:var(--red)}
.dbg-status.slow{color:var(--orange)}
.dbg-timing{color:var(--muted);flex-shrink:0;min-width:48px;text-align:right}
.dbg-detail{color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:400px;cursor:pointer}
.dbg-detail.expanded{white-space:pre-wrap;max-width:none;word-break:break-all}

.card{background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:1.5rem;transition:border-color .2s}
.card:hover{border-color:var(--border2)}

.badge{display:inline-flex;align-items:center;gap:4px;padding:.2rem .6rem;
  border-radius:6px;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.badge-critical{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.badge-high{background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.2)}
.badge-medium{background:rgba(234,179,8,.1);color:#facc15;border:1px solid rgba(234,179,8,.15)}
.badge-low{background:rgba(59,130,246,.1);color:#60a5fa;border:1px solid rgba(59,130,246,.15)}
.badge-info{background:rgba(16,185,129,.1);color:#34d399;border:1px solid rgba(16,185,129,.15)}
.badge-accent{background:var(--accent-glow);color:var(--accent2);border:1px solid rgba(220,38,38,.2)}

.glow-line{height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.3;margin:2rem 0}

.btn-primary{background:var(--accent);color:#fff;padding:.7rem 1.6rem;border-radius:10px;
  font-weight:600;font-size:.9rem;transition:all .25s;border:none;cursor:pointer;display:inline-block}
.btn-primary:hover{background:var(--accent2);color:#fff;transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(220,38,38,.25)}
.btn-secondary{background:var(--surface);color:var(--text);padding:.7rem 1.6rem;border-radius:10px;
  font-weight:600;font-size:.9rem;border:1px solid var(--border);transition:all .25s;
  cursor:pointer;display:inline-block}
.btn-secondary:hover{border-color:var(--border2);background:var(--surface2);color:#fff}

@media(max-width:640px){
  .nav-inner{padding:0 1rem}
  .container{padding:0 1rem}
  .nav-links{gap:1rem}
  .footer-inner{flex-direction:column;gap:.75rem;text-align:center}
}
</style>
{% block extra_css %}{% endblock %}
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-brand">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 2C16 2 6 6 6 14c0 4 2 7 4 9l-4 5h6l2-3c.6.2 1.3.3 2 .3s1.4-.1 2-.3l2 3h6l-4-5c2-2 4-5 4-9 0-8-10-12-10-12z" fill="#dc2626" opacity=".85"/>
        <circle cx="12" cy="13" r="2" fill="#08060a"/>
        <circle cx="20" cy="13" r="2" fill="#08060a"/>
        <path d="M13 18c0 0 1.5 2 3 2s3-2 3-2" stroke="#08060a" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="brand-text">Camazotz <span>Security</span></span>
    </a>
    <div class="nav-links">
      <a href="/" class="{% if request.path == '/' %}active{% endif %}">Home</a>
      <a href="/playground" class="{% if request.path == '/playground' %}active{% endif %}">Playground</a>
      <a href="/scenarios" class="{% if request.path == '/scenarios' %}active{% endif %}">Scenarios</a>
      <a href="/challenges" class="{% if request.path.startswith('/challenges') %}active{% endif %}">Challenges</a>
      <a href="/threat-map" class="{% if request.path == '/threat-map' %}active{% endif %}">Threat Map</a>
      <a href="/observer" class="{% if request.path == '/observer' %}active{% endif %}">Observer</a>
      <div class="diff-switcher">
        <label>Guardrails</label>
        <span class="diff-dot medium" id="diffDot"></span>
        <select id="diffSelect" onchange="switchDifficulty(this.value)">
          <option value="easy">EZ</option>
          <option value="medium" selected>MOD</option>
          <option value="hard">MAX</option>
        </select>
      </div>
      <button class="nav-reset" id="resetBtn" onclick="resetLabs()" title="Reset tool_lab and shadow_lab state">Reset</button>
    </div>
  </div>
</nav>

{% block content %}{% endblock %}

<footer class="footer">
  <div class="footer-inner">
    <div class="footer-text">&copy; 2026 Camazotz Security Corp. &mdash; MCP Security Platform &nbsp;<span class="dbg-trigger" id="dbgTrigger">&gt;_</span></div>
    <div class="footer-links">
      <a href="/scenarios">Scenarios</a>
      <a href="/playground">Playground</a>
      <a href="/observer">Observer</a>
    </div>
  </div>
</footer>

<script>
(function(){
  fetch('/api/config').then(r=>r.json()).then(d=>{
    if(d.difficulty){
      document.getElementById('diffSelect').value=d.difficulty;
      const dot=document.getElementById('diffDot');
      dot.className='diff-dot '+d.difficulty;
    }
  }).catch(()=>{});
})();
function switchDifficulty(level){
  fetch('/api/config',{method:'PUT',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({difficulty:level})})
    .then(r=>r.json()).then(d=>{
      const dot=document.getElementById('diffDot');
      dot.className='diff-dot '+(d.difficulty||level);
    }).catch(()=>{});
}
function resetLabs(){
  const btn=document.getElementById('resetBtn');
  btn.classList.add('resetting');
  btn.textContent='Resetting...';
  fetch('/api/reset',{method:'POST'})
    .then(r=>r.json()).then(d=>{
      btn.textContent='Done!';
      setTimeout(()=>{btn.textContent='Reset';btn.classList.remove('resetting')},1500);
      if(typeof sessionStorage!=='undefined')sessionStorage.removeItem('cztz_history');
    }).catch(()=>{
      btn.textContent='Failed';
      setTimeout(()=>{btn.textContent='Reset';btn.classList.remove('resetting')},1500);
    });
}
</script>
{% block extra_js %}{% endblock %}

<div id="cztzDbg">
  <div class="dbg-bar">
    <div class="dbg-bar-left"><span class="dot" id="dbgDot"></span><span>cztz debug</span><span id="dbgCount">0 entries</span></div>
    <div class="dbg-btns">
      <button onclick="cztzDbgCopy()">copy</button>
      <button onclick="cztzDbgClear()">clear</button>
      <button onclick="cztzDbgClose()">×</button>
    </div>
  </div>
  <div class="dbg-log" id="dbgLog"></div>
</div>

<script>
(function(){
  var _dbg=sessionStorage.getItem('cztz_dbg')==='1';
  var _clicks=0,_timer=null,_log=[];
  var panel=document.getElementById('cztzDbg');
  var trigger=document.getElementById('dbgTrigger');
  var logEl=document.getElementById('dbgLog');
  var countEl=document.getElementById('dbgCount');
  var dotEl=document.getElementById('dbgDot');

  if(_dbg){panel.classList.add('open');trigger.classList.add('active');}

  trigger.addEventListener('click',function(){
    _clicks++;
    clearTimeout(_timer);
    _timer=setTimeout(function(){_clicks=0;},1500);
    if(_clicks>=3){
      _clicks=0;
      _dbg=!_dbg;
      sessionStorage.setItem('cztz_dbg',_dbg?'1':'0');
      panel.classList.toggle('open',_dbg);
      trigger.classList.toggle('active',_dbg);
    }
  });

  window.cztzDbgClose=function(){
    _dbg=false;
    sessionStorage.setItem('cztz_dbg','0');
    panel.classList.remove('open');
    trigger.classList.remove('active');
  };
  window.cztzDbgClear=function(){
    _log=[];logEl.innerHTML='';countEl.textContent='0 entries';
    dotEl.className='dot';
  };
  window.cztzDbgCopy=function(){
    var txt=_log.map(function(e){
      return e.ts+' '+e.method+' '+e.url+' '+e.status+' '+e.ms+'ms'+(e.detail?' '+e.detail:'');
    }).join('\n');
    navigator.clipboard.writeText(txt).then(function(){
      countEl.textContent='copied!';
      setTimeout(function(){countEl.textContent=_log.length+' entries';},1200);
    });
  };

  function _addEntry(e){
    _log.push(e);
    countEl.textContent=_log.length+' entries';
    var hasErr=_log.some(function(x){return x.status>=400||x.status===0;});
    dotEl.className='dot'+(hasErr?' err':'');
    var row=document.createElement('div');
    row.className='dbg-entry';
    var sc=e.status>=400||e.status===0?'err':e.ms>2000?'slow':'ok';
    row.innerHTML='<span class="dbg-ts">'+e.ts+'</span>'+
      '<span class="dbg-method '+e.method.toLowerCase()+'">'+e.method+'</span>'+
      '<span class="dbg-url">'+e.url+'</span>'+
      '<span class="dbg-status '+sc+'">'+e.status+'</span>'+
      '<span class="dbg-timing">'+e.ms+'ms</span>'+
      (e.detail?'<span class="dbg-detail" onclick="this.classList.toggle(\'expanded\')">'+_esc(e.detail)+'</span>':'');
    logEl.appendChild(row);
    logEl.scrollTop=logEl.scrollHeight;
  }

  function _esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function _ts(){var d=new Date();return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2)+':'+('0'+d.getSeconds()).slice(-2);}

  var _origFetch=window.fetch;
  window.fetch=function(url,opts){
    if(typeof url==='string'&&url.indexOf('/api/')===0){
      var method=(opts&&opts.method||'GET').toUpperCase();
      var t0=performance.now();
      return _origFetch.apply(this,arguments).then(function(resp){
        var ms=Math.round(performance.now()-t0);
        var clone=resp.clone();
        clone.text().then(function(body){
          var detail='';
          try{var j=JSON.parse(body);if(j.error)detail='ERROR: '+JSON.stringify(j.error);
          else{var k=Object.keys(j);detail=k.slice(0,4).join(', ')+(k.length>4?' +'+( k.length-4):'');}}catch(ex){detail=body.substring(0,120);}
          _addEntry({ts:_ts(),method:method,url:url,status:resp.status,ms:ms,detail:detail});
        });
        return resp;
      }).catch(function(err){
        var ms=Math.round(performance.now()-t0);
        _addEntry({ts:_ts(),method:method,url:url,status:0,ms:ms,detail:'NETWORK: '+err.message});
        throw err;
      });
    }
    return _origFetch.apply(this,arguments);
  };
})();
</script>
</body>
</html>
