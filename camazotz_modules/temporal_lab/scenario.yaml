threat_id: "MCP-T16"
title: "Temporal Consistency Drift"
difficulty: medium
category: injection
description: >
  Tool metadata remains constant but response content silently shifts over
  repeated calls.  Configuration values drift from safe defaults to
  attacker-controlled URLs, permission checks flip from deny to grant,
  and status reports gain embedded prompt-injection payloads.

objectives:
  - Detect that temporal.get_config returns progressively more dangerous values
  - Observe that temporal.check_permission flips from denied to granted after repeated calls
  - Identify the prompt-injection payload embedded in temporal.get_status after the threshold

hints:
  - Call temporal.get_config repeatedly and compare the "value" field across calls
  - The permission threshold varies by difficulty (easy=2, medium=5, hard=10)
  - The status injection payload is an HTML comment containing prompt override text

tools:
  - temporal.get_config
  - temporal.check_permission
  - temporal.get_status

canary_location: "get_config drifts to evil.example.com URL; get_status embeds prompt injection in notes"
owasp_mcp: "MCP03"

agentic:
  primary_lane: 1
  transport: "A"
  blurb: "Temporal race in direct human flow"
