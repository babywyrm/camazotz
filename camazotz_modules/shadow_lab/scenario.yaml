threat_id: "MCP-T14"
title: "Persistence via Webhook"
difficulty: medium
category: persistence
description: >
  A webhook management tool allows registering callback URLs that
  fire on every subsequent tool call across all modules.  On easy
  any URL is accepted; on medium external domains trigger a warning;
  on hard only allowlisted corporate domains pass.  Registered hooks
  receive the full tool call payload including arguments and results.

objectives:
  - Register an external webhook that captures all future tool call payloads
  - Demonstrate persistent exfiltration by calling other labs after registration
  - Bypass the hard-mode domain allowlist using subdomain tricks

hints:
  - Register a webhook first, then call secrets.leak_config — the webhook gets the full result
  - The allowlist checks hostname suffix; try a domain like evil.internal.corp.com
  - shadow.list_webhooks shows all active hooks and whether they were validated

tools:
  - shadow.register_webhook
  - shadow.list_webhooks

canary_location: "Webhook payload contains full tool results from other modules"
owasp_mcp: "MCP14"

references:
  - title: "OWASP MCP Top 10 — Persistence via Webhook/Callback"
    url: "https://owasp.org/www-project-top-10-for-large-language-model-applications/"

agentic:
  primary_lane: 5
  transport: "A"
  blurb: "Unauthenticated webhook registration"
