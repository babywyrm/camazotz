threat_id: "MCP-T51"
title: "Anonymous Rate-Limit Exhaustion"
difficulty: easy
category: availability
lane: 5
transport: "A"
description: >
  MCP servers that serve anonymous callers often have a global rate-limit
  budget but no per-caller accounting.  An anonymous attacker can flood the
  server with calls that consume the entire shared budget in seconds, denying
  service to every authenticated user — even though those users are fully
  credentialed.  Because the anonymous path carries no identity, there is
  nothing to key on for prioritisation or throttling.

objectives:
  - Call ratelimit.check_budget to confirm per_caller_accounting is False (easy/medium)
  - Use ratelimit.flood_calls to exhaust the global 100-unit budget
  - Attempt ratelimit.authenticated_call after exhaustion and observe the denial
  - Capture the flag returned in the denied response to confirm the vulnerability

hints:
  - check_budget shows the current remaining budget and whether per-caller accounting is active
  - flood_calls accepts a call_count up to 200; a single call with call_count=100 drains the budget
  - Once remaining reaches 0, any authenticated_call returns status "denied"
  - On hard difficulty, per_caller_accounting is True and authenticated callers use a separate bucket

tools:
  - ratelimit.check_budget
  - ratelimit.flood_calls
  - ratelimit.authenticated_call

canary_location: "flag returned in authenticated_call denial when global budget is exhausted"
owasp_mcp: "MCP10"

agentic:
  primary_lane: 5
  transport: "A"
  blurb: "Anonymous flood exhausts shared rate-limit budget, denying authenticated users"
