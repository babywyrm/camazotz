apiVersion: v1
kind: Service
metadata:
  name: brain-gateway-policed
  namespace: camazotz
  labels:
    app: brain-gateway
    app.kubernetes.io/part-of: camazotz
    app.kubernetes.io/component: policy-enforced
spec:
  type: NodePort
  selector:
    app: brain-gateway
  ports:
    - name: mcp-policed
      port: 8080
      targetPort: 9090
      nodePort: 30090
      protocol: TCP
    - name: nullfield-admin
      port: 9091
      targetPort: 9091
      nodePort: 31591
      protocol: TCP
