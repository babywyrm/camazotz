apiVersion: apps/v1
kind: Deployment
metadata:
  name: zitadel
  namespace: camazotz
  labels:
    app: zitadel
    app.kubernetes.io/part-of: camazotz
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zitadel
  template:
    metadata:
      labels:
        app: zitadel
    spec:
      initContainers:
        - name: wait-for-zitadel-postgres
          image: postgres:16
          command:
            - /bin/sh
            - -c
            - until pg_isready -h zitadel-postgres -p 5432 -U zitadel; do sleep 2; done
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: camazotz-secrets
                  key: ZITADEL_DB_PASSWORD
      containers:
        - name: zitadel
          image: ghcr.io/zitadel/zitadel:latest
          command:
            - /app/zitadel
          args:
            - start-from-init
            - --masterkey=$(ZITADEL_MASTERKEY)
          env:
            - name: ZITADEL_PORT
              value: "8080"
            - name: ZITADEL_EXTERNALDOMAIN
              value: "zitadel"
            - name: ZITADEL_EXTERNALPORT
              value: "8080"
            - name: ZITADEL_EXTERNALSECURE
              value: "false"
            - name: ZITADEL_TLS_ENABLED
              value: "false"
            - name: ZITADEL_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: camazotz-secrets
                  key: ZITADEL_DB_PASSWORD
            - name: ZITADEL_DATABASE_POSTGRES_DSN
              value: "postgres://zitadel:$(ZITADEL_DB_PASSWORD)@zitadel-postgres:5432/zitadel?sslmode=disable"
            - name: ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED
              value: "false"
            - name: ZITADEL_MASTERKEY
              valueFrom:
                secretKeyRef:
                  name: camazotz-secrets
                  key: ZITADEL_MASTERKEY
          ports:
            - containerPort: 8080
          readinessProbe:
            exec:
              command: ["/app/zitadel", "ready"]
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: zitadel
  namespace: camazotz
  labels:
    app.kubernetes.io/part-of: camazotz
spec:
  selector:
    app: zitadel
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
