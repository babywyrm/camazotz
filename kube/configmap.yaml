apiVersion: v1
kind: ConfigMap
metadata:
  name: camazotz-config
  namespace: camazotz
  labels:
    app.kubernetes.io/part-of: camazotz
data:
  BRAIN_PROVIDER: "cloud"
  AWS_REGION: ""
  AWS_PROFILE: ""
  CAMAZOTZ_BEDROCK_STUB: ""
  CAMAZOTZ_MODEL: "claude-sonnet-4-20250514"
  CAMAZOTZ_DIFFICULTY: "medium"
  CAMAZOTZ_SHOW_TOKENS: "false"
  OLLAMA_HOST: "http://ollama:11434"
  CAMAZOTZ_OLLAMA_MODEL: "llama3.2:3b"
  CAMAZOTZ_IDP_PROVIDER: "mock"
  CAMAZOTZ_IDP_ISSUER_URL: ""
  CAMAZOTZ_IDP_TOKEN_ENDPOINT: ""
  CAMAZOTZ_IDP_INTROSPECTION_ENDPOINT: ""
  CAMAZOTZ_IDP_REVOCATION_ENDPOINT: ""
  CAMAZOTZ_IDP_CLIENT_ID: ""
  GATEWAY_URL: "http://brain-gateway:8080"
  OBSERVER_POLL_INTERVAL: "2"
  LOG_LEVEL: "info"
