services:
  brain-gateway:
    image: python:3.13-slim
    working_dir: /workspace
    volumes:
      - ..:/workspace
    command: sh -c "pip install uv && uv sync && uv run uvicorn brain_gateway.app.main:app --host 0.0.0.0 --port 8080"
    environment:
      - BRAIN_PROVIDER=${BRAIN_PROVIDER:-cloud}
    ports:
      - "8080:8080"

  observer:
    image: python:3.13-slim
    working_dir: /workspace
    volumes:
      - ..:/workspace
    command: sh -c "pip install uv && uv sync && uv run python -c 'print(\"observer sidecar active\")'"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
