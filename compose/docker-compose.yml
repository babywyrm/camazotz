services:
  brain-gateway:
    build:
      context: ..
      dockerfile: compose/Dockerfile
    environment:
      - BRAIN_PROVIDER=${BRAIN_PROVIDER:-cloud}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CAMAZOTZ_MODEL=${CAMAZOTZ_MODEL:-claude-sonnet-4-20250514}
      - CAMAZOTZ_DIFFICULTY=${CAMAZOTZ_DIFFICULTY:-easy}
      - CAMAZOTZ_SHOW_TOKENS=${CAMAZOTZ_SHOW_TOKENS:-false}
    ports:
      - "8080:8080"

  observer:
    build:
      context: ..
      dockerfile: compose/Dockerfile
    command: python -c "import time; print('observer sidecar active'); time.sleep(999999)"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
