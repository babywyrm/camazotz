# Portable nullfield overlay for the camazotz Compose stack.
#
# Adds a nullfield proxy in front of brain-gateway so the same agentic
# feedback loop (scan -> generate-policy -> apply -> re-scan) runs on a
# pure Docker Compose host with no Kubernetes anywhere.
#
# Usage:
#   docker compose \
#     -f compose/docker-compose.yml \
#     -f compose/docker-compose.nullfield.yml \
#     up -d
#
# Endpoints after `up`:
#   :8080  brain-gateway direct      (bypass — no policy enforcement)
#   :9090  nullfield -> brain-gateway (policed — full enforcement)
#   :9091  nullfield admin           (status / holds / metrics)
#
# Then run the loop:
#   make feedback-loop-print           (defaults to localhost:8080 / :9090)
#
# To pin a specific nullfield release, set NULLFIELD_TAG (default: latest).
# To use a fork or a locally-built image, override NULLFIELD_IMAGE.
# To swap in a stricter policy bundle (e.g. nullfield's shipped
# `integrations/camazotz/policy.yaml`), bind-mount it over
# `/etc/nullfield/policy.yaml` in the volumes block below.

services:
  nullfield:
    image: "${NULLFIELD_IMAGE:-ghcr.io/babywyrm/nullfield}:${NULLFIELD_TAG:-latest}"
    container_name: camazotz-nullfield
    environment:
      NULLFIELD_LISTEN_ADDR: ":9090"
      NULLFIELD_UPSTREAM_ADDR: "brain-gateway:8080"
      NULLFIELD_ADMIN_ADDR: ":9091"
      NULLFIELD_POLICY_PATH: "/etc/nullfield/policy.yaml"
      NULLFIELD_REGISTRY_PATH: "/etc/nullfield/tools.yaml"
      NULLFIELD_AUDIT_LOG_LEVEL: "FULL"
    volumes:
      - ./nullfield/policy.yaml:/etc/nullfield/policy.yaml:ro
      - ./nullfield/tools.yaml:/etc/nullfield/tools.yaml:ro
    ports:
      - "9090:9090"
      - "9091:9091"
    depends_on:
      brain-gateway:
        condition: service_healthy
    networks:
      - camazotz
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
