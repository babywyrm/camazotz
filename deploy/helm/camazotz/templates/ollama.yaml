{{- if .Values.ollama.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "camazotz.selectorLabels" "ollama" | nindent 4 }}
    {{- include "camazotz.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "camazotz.selectorLabels" "ollama" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "camazotz.selectorLabels" "ollama" | nindent 8 }}
    spec:
      containers:
        - name: ollama
          image: "{{ .Values.ollama.image }}:{{ .Values.ollama.tag }}"
          ports:
            - containerPort: {{ .Values.ollama.port }}
          volumeMounts:
            - name: ollama-models
              mountPath: /root/.ollama
          readinessProbe:
            httpGet:
              path: {{ .Values.ollama.healthPath }}
              port: {{ .Values.ollama.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.ollama.resources | nindent 12 }}
      volumes:
        - name: ollama-models
          persistentVolumeClaim:
            claimName: ollama-models
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "camazotz.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.ollama.storageClass }}
  resources:
    requests:
      storage: {{ .Values.ollama.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "camazotz.selectorLabels" "ollama" | nindent 4 }}
    {{- include "camazotz.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "camazotz.selectorLabels" "ollama" | nindent 4 }}
  ports:
    - port: {{ .Values.ollama.port }}
      targetPort: {{ .Values.ollama.port }}
      protocol: TCP
{{- end }}
