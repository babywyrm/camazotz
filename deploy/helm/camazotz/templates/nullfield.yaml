{{- if .Values.nullfield.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: nullfield-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "camazotz.labels" . | nindent 4 }}
data:
  NULLFIELD_LISTEN_ADDR: ":{{ .Values.nullfield.listenPort }}"
  NULLFIELD_UPSTREAM_ADDR: "localhost:{{ .Values.gateway.port }}"
  NULLFIELD_ADMIN_ADDR: ":{{ .Values.nullfield.adminPort }}"
  NULLFIELD_POLICY_PATH: "/etc/nullfield/policy.yaml"
  NULLFIELD_REGISTRY_PATH: "/etc/nullfield/tools.yaml"
  NULLFIELD_CIRCUIT_MAX_CALLS: {{ .Values.nullfield.circuitMaxCalls | quote }}
  NULLFIELD_CIRCUIT_MAX_DURATION: {{ .Values.nullfield.circuitMaxDuration | quote }}
  NULLFIELD_AUDIT_LOG_LEVEL: {{ .Values.nullfield.auditLogLevel | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nullfield-tools
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "camazotz.labels" . | nindent 4 }}
data:
  {{- (.Files.Glob "files/nullfield/*").AsConfig | nindent 2 }}
{{- end }}
