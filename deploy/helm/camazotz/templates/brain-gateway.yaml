apiVersion: apps/v1
kind: Deployment
metadata:
  name: brain-gateway
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "camazotz.selectorLabels" "brain-gateway" | nindent 4 }}
    {{- include "camazotz.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      {{- include "camazotz.selectorLabels" "brain-gateway" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "camazotz.selectorLabels" "brain-gateway" | nindent 8 }}
    spec:
      containers:
        - name: brain-gateway
          image: "{{ .Values.gateway.image }}:{{ .Values.gateway.tag }}"
          imagePullPolicy: {{ .Values.gateway.pullPolicy }}
          ports:
            - containerPort: {{ .Values.gateway.port }}
          envFrom:
            - configMapRef:
                name: camazotz-config
            - secretRef:
                name: camazotz-secrets
          readinessProbe:
            httpGet:
              path: {{ .Values.gateway.healthPath }}
              port: {{ .Values.gateway.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: {{ .Values.gateway.healthPath }}
              port: {{ .Values.gateway.port }}
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: brain-gateway
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "camazotz.selectorLabels" "brain-gateway" | nindent 4 }}
    {{- include "camazotz.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "camazotz.selectorLabels" "brain-gateway" | nindent 4 }}
  ports:
    - port: {{ .Values.gateway.port }}
      targetPort: {{ .Values.gateway.port }}
      protocol: TCP
