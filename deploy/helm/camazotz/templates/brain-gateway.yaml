apiVersion: apps/v1
kind: Deployment
metadata:
  name: brain-gateway
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "camazotz.selectorLabels" "brain-gateway" | nindent 4 }}
    {{- include "camazotz.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      {{- include "camazotz.selectorLabels" "brain-gateway" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "camazotz.selectorLabels" "brain-gateway" | nindent 8 }}
    spec:
      volumes:
        - name: flags
          emptyDir: {}
        {{- if .Values.nullfield.enabled }}
        - name: nullfield-tools
          configMap:
            name: nullfield-tools
        {{- end }}
      containers:
        - name: brain-gateway
          image: "{{ .Values.gateway.image }}:{{ .Values.gateway.tag }}"
          imagePullPolicy: {{ .Values.gateway.pullPolicy }}
          ports:
            - containerPort: {{ .Values.gateway.port }}
          envFrom:
            - configMapRef:
                name: camazotz-config
            - secretRef:
                name: camazotz-secrets
          env:
            - name: CAMAZOTZ_FLAGS_DIR
              value: {{ .Values.gateway.flagsDir | quote }}
            - name: CAMAZOTZ_MODULES_DIR
              value: {{ .Values.gateway.modulesDir | default "/workspace/camazotz_modules" | quote }}
          volumeMounts:
            - name: flags
              mountPath: {{ .Values.gateway.flagsDir | quote }}
          readinessProbe:
            httpGet:
              path: {{ .Values.gateway.healthPath }}
              port: {{ .Values.gateway.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: {{ .Values.gateway.healthPath }}
              port: {{ .Values.gateway.port }}
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
        {{- if .Values.nullfield.enabled }}
        - name: nullfield
          image: "{{ .Values.nullfield.image }}:{{ .Values.nullfield.tag }}"
          imagePullPolicy: {{ .Values.nullfield.pullPolicy }}
          ports:
            - name: proxy
              containerPort: {{ .Values.nullfield.listenPort }}
              protocol: TCP
            - name: admin
              containerPort: {{ .Values.nullfield.adminPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: nullfield-config
          volumeMounts:
            - name: nullfield-tools
              mountPath: /etc/nullfield
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: admin
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: admin
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            {{- toYaml .Values.nullfield.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: brain-gateway
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "camazotz.selectorLabels" "brain-gateway" | nindent 4 }}
    {{- include "camazotz.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "camazotz.selectorLabels" "brain-gateway" | nindent 4 }}
  ports:
    - name: mcp
      port: {{ .Values.gateway.port }}
      {{- if .Values.nullfield.enabled }}
      targetPort: {{ .Values.nullfield.listenPort }}
      {{- else }}
      targetPort: {{ .Values.gateway.port }}
      {{- end }}
      protocol: TCP
    {{- if .Values.nullfield.enabled }}
    - name: nullfield-admin
      port: {{ .Values.nullfield.adminPort }}
      targetPort: {{ .Values.nullfield.adminPort }}
      protocol: TCP
    {{- end }}
