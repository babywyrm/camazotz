{{- if .Values.zitadel.enabled }}
{{- if .Values.zitadelPostgres.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zitadel-postgres
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "camazotz.selectorLabels" "zitadel-postgres" | nindent 4 }}
    {{- include "camazotz.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "camazotz.selectorLabels" "zitadel-postgres" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "camazotz.selectorLabels" "zitadel-postgres" | nindent 8 }}
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.zitadelPostgres.image }}:{{ .Values.zitadelPostgres.tag }}"
          imagePullPolicy: {{ .Values.zitadelPostgres.pullPolicy }}
          env:
            - name: POSTGRES_DB
              value: {{ .Values.zitadelPostgres.db | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.zitadelPostgres.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: camazotz-secrets
                  key: ZITADEL_DB_PASSWORD
          ports:
            - containerPort: {{ .Values.zitadelPostgres.port }}
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -d {{ .Values.zitadelPostgres.db }} -U {{ .Values.zitadelPostgres.user }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -d {{ .Values.zitadelPostgres.db }} -U {{ .Values.zitadelPostgres.user }}
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            {{- toYaml .Values.zitadelPostgres.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: zitadel-postgres
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "camazotz.selectorLabels" "zitadel-postgres" | nindent 4 }}
    {{- include "camazotz.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "camazotz.selectorLabels" "zitadel-postgres" | nindent 4 }}
  ports:
    - port: {{ .Values.zitadelPostgres.port }}
      targetPort: {{ .Values.zitadelPostgres.port }}
      protocol: TCP
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zitadel
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "camazotz.selectorLabels" "zitadel" | nindent 4 }}
    {{- include "camazotz.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "camazotz.selectorLabels" "zitadel" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "camazotz.selectorLabels" "zitadel" | nindent 8 }}
    spec:
      containers:
        - name: zitadel
          image: "{{ .Values.zitadel.image }}:{{ .Values.zitadel.tag }}"
          imagePullPolicy: {{ .Values.zitadel.pullPolicy }}
          command:
            - /app/zitadel
          args:
            - start-from-init
            - --masterkey=$(ZITADEL_MASTERKEY)
          env:
            - name: ZITADEL_PORT
              value: {{ .Values.zitadel.port | quote }}
            - name: ZITADEL_EXTERNALDOMAIN
              value: {{ .Values.zitadel.externalDomain | quote }}
            - name: ZITADEL_EXTERNALPORT
              value: {{ .Values.zitadel.externalPort | quote }}
            - name: ZITADEL_EXTERNALSECURE
              value: {{ .Values.zitadel.externalSecure | quote }}
            - name: ZITADEL_TLS_ENABLED
              value: "false"
            - name: ZITADEL_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: camazotz-secrets
                  key: ZITADEL_DB_PASSWORD
            - name: ZITADEL_DATABASE_POSTGRES_DSN
              value: "postgres://{{ .Values.zitadelPostgres.user }}:$(ZITADEL_DB_PASSWORD)@zitadel-postgres:{{ .Values.zitadelPostgres.port }}/{{ .Values.zitadelPostgres.db }}?sslmode=disable"
            - name: ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED
              value: {{ .Values.zitadel.firstInstancePasswordChangeRequired | quote }}
            - name: ZITADEL_MASTERKEY
              valueFrom:
                secretKeyRef:
                  name: camazotz-secrets
                  key: ZITADEL_MASTERKEY
          ports:
            - containerPort: {{ .Values.zitadel.port }}
          readinessProbe:
            exec:
              command:
                - /app/zitadel
                - ready
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - /app/zitadel
                - ready
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            {{- toYaml .Values.zitadel.resources | nindent 12 }}
{{- if .Values.zitadelPostgres.enabled }}
      initContainers:
        - name: wait-for-zitadel-postgres
          image: "{{ .Values.zitadelPostgres.image }}:{{ .Values.zitadelPostgres.tag }}"
          command:
            - /bin/sh
            - -c
            - until pg_isready -h zitadel-postgres -p {{ .Values.zitadelPostgres.port }} -U {{ .Values.zitadelPostgres.user }}; do sleep 2; done
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: camazotz-secrets
                  key: ZITADEL_DB_PASSWORD
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: zitadel
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "camazotz.selectorLabels" "zitadel" | nindent 4 }}
    {{- include "camazotz.labels" . | nindent 4 }}
spec:
  type: {{ .Values.zitadel.serviceType }}
  selector:
    {{- include "camazotz.selectorLabels" "zitadel" | nindent 4 }}
  ports:
    - port: {{ .Values.zitadel.port }}
      targetPort: {{ .Values.zitadel.port }}
      protocol: TCP
      {{- if eq .Values.zitadel.serviceType "NodePort" }}
      nodePort: {{ .Values.zitadel.hostPort }}
      {{- end }}
{{- end }}
