apiVersion: v1
kind: ConfigMap
metadata:
  name: camazotz-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "camazotz.labels" . | nindent 4 }}
data:
  BRAIN_PROVIDER: {{ .Values.config.brainProvider | quote }}
  AWS_REGION: {{ .Values.config.awsRegion | quote }}
  AWS_PROFILE: {{ .Values.config.awsProfile | quote }}
  CAMAZOTZ_BEDROCK_STUB: {{ .Values.config.camazotzBedrockStub | quote }}
  CAMAZOTZ_MODEL: {{ .Values.config.camazotzModel | quote }}
  CAMAZOTZ_DIFFICULTY: {{ .Values.config.difficulty | quote }}
  CAMAZOTZ_SHOW_TOKENS: {{ .Values.config.showTokens | quote }}
  OLLAMA_HOST: {{ .Values.config.ollamaHost | quote }}
  CAMAZOTZ_OLLAMA_MODEL: {{ .Values.config.ollamaModel | quote }}
  GATEWAY_URL: {{ .Values.config.gatewayUrl | quote }}
  OBSERVER_POLL_INTERVAL: {{ .Values.config.observerPollInterval | quote }}
  OBSERVER_BUFFER_SIZE: {{ .Values.config.observerBufferSize | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  CAMAZOTZ_IDP_PROVIDER: {{ .Values.config.idpProvider | quote }}
  CAMAZOTZ_IDP_ISSUER_URL: {{ .Values.config.idpIssuerUrl | quote }}
  CAMAZOTZ_IDP_TOKEN_ENDPOINT: {{ .Values.config.idpTokenEndpoint | quote }}
  CAMAZOTZ_IDP_INTROSPECTION_ENDPOINT: {{ .Values.config.idpIntrospectionEndpoint | quote }}
  CAMAZOTZ_IDP_REVOCATION_ENDPOINT: {{ .Values.config.idpRevocationEndpoint | quote }}
  CAMAZOTZ_IDP_CLIENT_ID: {{ .Values.config.idpClientId | quote }}
